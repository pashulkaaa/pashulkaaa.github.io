<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый трекер</title>
    <!-- 1. Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 2. Наши стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>➕ Добавить расход</h1>
        <form id="expense-form">
            <div class="form-group">
                <label for="category">Категория</label>
                <input type="text" id="category" placeholder="Например: Еда" required>
            </div>
            <div class="form-group">
                <label for="amount">Сумма (₽)</label>
                <input type="number" id="amount" placeholder="Например: 500" required>
            </div>
            <button type="submit" class="btn-primary">Добавить</button>
        </form>
        <div id="status-message"></div>
    </div>
    <!-- 3. Наш скрипт -->
    <script src="app.js"></script>
</body>
</html>
